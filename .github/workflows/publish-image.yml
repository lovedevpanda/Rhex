name: Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run prisma:generate

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

  publish:
    name: Build and publish image
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lovedevpanda/rhex
          tags: |
            type=ref,event=tag
            type=sha
          labels: |
            org.opencontainers.image.source=https://github.com/lovedevpanda/Rhex

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_DEPLOYMENT_ID=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Promote current default branch image to latest
        if: github.ref_type == 'branch' && github.ref_name == github.event.repository.default_branch
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_NAME: ghcr.io/lovedevpanda/rhex
        shell: bash
        run: |
          remote_sha="$(git ls-remote origin "$GITHUB_REF" | awk 'NR == 1 { print $1 }')"

          if [[ -z "$remote_sha" ]]; then
            echo "::error::Could not resolve remote HEAD for $GITHUB_REF"
            exit 1
          fi

          if [[ "$remote_sha" != "$GITHUB_SHA" ]]; then
            echo "::notice::Skipping latest promotion because $GITHUB_SHA is no longer the head of $GITHUB_REF"
            exit 0
          fi

          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}@${IMAGE_DIGEST}"
